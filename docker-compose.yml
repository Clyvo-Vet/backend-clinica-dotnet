services:
  kura-api:
    build:
      context: .
      dockerfile: src/Kura.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__OracleConnection=User Id=RM562999;Password=081105;Data Source=oracle-xe:1521/XEPDB1
      - Jwt__Key=kura-api-secret-key-fiap-2026-clyvovet
      - Jwt__Issuer=kura-api
      - Jwt__Audience=kura-client
      - IoT__ApiKey=kura-iot-device-key-2026
    depends_on:
      oracle-xe:
        condition: service_healthy

  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=081105
      - APP_USER=RM562999
      - APP_USER_PASSWORD=081105
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
